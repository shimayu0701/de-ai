<!DOCTYPE html>
<html>
<head>
  <title>Sample AI-like site</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .hero {
      background: linear-gradient(to right, #7c3aed, #2563eb);
      text-align: center;
      padding: 5rem;
    }
    .title {
      font-size: 4rem;
      background: linear-gradient(to right, #fff, #e0e0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .card {
      border-radius: 1.5rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.1);
    }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
    .btn {
      background: linear-gradient(to right, #7c3aed, #2563eb);
      border-radius: 9999px;
      padding: 1rem 2rem;
      color: white;
    }
  </style>
</head>
<body>
  <section class="hero">
    <h1 class="title">Build faster with AI</h1>
    <p>The most powerful platform for modern teams</p>
    <button class="btn">Get Started</button>
    <a href="#">Learn More</a>
  </section>

  <section>
    <div class="grid">
      <div class="card"><h3>Feature One</h3><p>Description</p></div>
      <div class="card"><h3>Feature Two</h3><p>Description</p></div>
      <div class="card"><h3>Feature Three</h3><p>Description</p></div>
    </div>
  </section>

  <section>
    <h2>Trusted by 1000+ companies</h2>
    <div class="logos">...</div>
  </section>
</body>
</html>
